<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zone Defence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; }
        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 10; }
        #ui-overlay.active { pointer-events: auto; }
        .screen { display: none; flex-direction: column; align-items: center; gap: 14px; background: rgba(0,0,30,0.95); border: 3px solid #0af; padding: 28px 44px; text-align: center; box-shadow: 0 0 0 3px #000, 0 0 0 6px #048, 0 0 30px rgba(0,100,255,0.3); }
        .screen.visible { display: flex; }
        .screen h1 { color: #0ff; font-size: 1.1rem; text-shadow: 2px 2px #006; letter-spacing: 2px; }
        .screen h2 { color: #0ff; font-size: 0.9rem; text-shadow: 2px 2px #006; }
        .screen p { color: #8af; font-size: 0.5rem; line-height: 2; max-width: 360px; }
        .screen .stat { color: #0f0; font-size: 0.6rem; text-shadow: 1px 1px #040; }
        .btn { background: #004; border: 2px solid #0af; color: #0ff; padding: 10px 28px; font-family: inherit; font-size: 0.55rem; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; pointer-events: auto; box-shadow: 0 3px 0 #006; }
        .btn:hover { background: #08f; color: #fff; }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #006; }
        .btn-green { border-color: #0a0; color: #0f0; background: #020; box-shadow: 0 3px 0 #040; }
        .btn-green:hover { background: #0a0; color: #fff; }
        .btn-red { border-color: #a00; color: #f44; background: #200; box-shadow: 0 3px 0 #400; }
        .btn-red:hover { background: #a00; color: #fff; }
        #hud { position: absolute; top: 0; left: 0; right: 0; display: none; justify-content: space-between; align-items: center; color: #0ff; font-size: 0.45rem; z-index: 5; pointer-events: none; padding: 5px 8px; background: linear-gradient(180deg, rgba(0,0,40,0.9) 0%, rgba(0,0,20,0.7) 80%, transparent 100%); border-bottom: 1px solid rgba(0,100,255,0.2); }
        #hud .hg { display: flex; gap: 12px; align-items: center; }
        .hl { color: #68a; } .hv { color: #0ff; } .hs { color: #ff0; } .hlv { color: #f44; letter-spacing: 2px; }
        #hud-pause { pointer-events: auto; cursor: pointer; color: #0af; font-size: 0.55rem; background: none; border: 1px solid #0af; padding: 2px 6px; font-family: inherit; }
        #dpad { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20; pointer-events: auto; }
        .db { position: absolute; width: 54px; height: 54px; background: rgba(0,150,255,0.08); border: 2px solid rgba(0,150,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: rgba(0,200,255,0.5); font-size: 18px; touch-action: none; user-select: none; }
        .db:active,.db.pressed { background: rgba(0,150,255,0.3); border-color: #0af; }
        #du { left: 58px; top: 0; } #dd { left: 58px; top: 114px; } #dl { left: 0; top: 57px; } #dr { left: 116px; top: 57px; }
        @media (pointer: coarse), (max-width: 768px) { #dpad { display: block; } }
        #pov { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 30; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        #pov.visible { display: flex; }
        #pov h2 { color: #ff0; font-size: 1rem; text-shadow: 2px 2px #840; margin-bottom: 8px; }
        .pb { font-family: inherit; font-size: 0.5rem; padding: 8px 32px; border: 2px solid; cursor: pointer; min-width: 180px; letter-spacing: 1px; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
    <div class="hg"><span><span class="hl">SEC</span> <span class="hv" id="h-lv">1</span></span><span><span class="hl">SCORE</span> <span class="hs" id="h-sc">0</span></span><span><span class="hl">HI</span> <span class="hs" id="h-hi">0</span></span></div>
    <div class="hg"><span><span class="hl">ZONE</span> <span class="hv" id="h-cl">0%</span></span><span class="hlv" id="h-lv2">♥♥♥</span><button id="hud-pause">II</button></div>
</div>
<div id="ui-overlay" class="active">
    <div class="screen visible" id="scr-title">
        <h1>🚀 ZONE DEFENCE</h1>
        <p>PILOT YOUR SHIP THROUGH SPACE.<br>CLAIM TERRITORY BY CUTTING THROUGH<br>THE VOID AND RETURNING TO BORDER.<br><br>▲▼◀▶ / WASD TO FLY<br>COLLECT POWER-UPS FOR BOOSTS!</p>
        <button class="btn btn-green" id="b-start">▶ LAUNCH</button>
    </div>
    <div class="screen" id="scr-lvl"><h2 id="l-title">SECTOR 1</h2><p id="l-desc"></p><button class="btn btn-green" id="b-go">▶ ENGAGE</button></div>
    <div class="screen" id="scr-die"><h2 style="color:#f44;text-shadow:2px 2px #400;">⚠ SHIELDS DOWN</h2><p class="stat" id="d-info"></p><button class="btn" id="b-cont">RECHARGE</button></div>
    <div class="screen" id="scr-over"><h2 style="color:#f44;text-shadow:2px 2px #400;">GAME OVER</h2><p class="stat" id="o-sc"></p><p class="stat" id="o-info"></p><button class="btn btn-red" id="b-retry">RETRY</button><button class="btn" id="b-map1">MAP</button></div>
    <div class="screen" id="scr-win"><h2 style="color:#0f0;text-shadow:2px 2px #040;">★ SECTOR CLEAR ★</h2><p class="stat" id="w-sc"></p><p class="stat" id="w-info"></p><div id="w-stars" style="font-size:1.2rem;color:#ff0;text-shadow:2px 2px #840;"></div><button class="btn btn-green" id="b-next">NEXT ▶</button><button class="btn" id="b-map2">MAP</button></div>
    <div class="screen" id="scr-done"><h1 style="color:#ff0;text-shadow:2px 2px #840;">★ MISSION COMPLETE ★</h1><p class="stat" id="c-sc"></p><button class="btn btn-green" id="b-again">NEW GAME</button></div>
</div>
<div id="pov"><h2>PAUSED</h2><button class="pb btn btn-green" id="p-res">▶ CONTINUE</button><button class="pb btn" id="p-rty">↺ RETRY</button><button class="pb btn" id="p-map">MAP</button><button class="pb btn btn-red" id="p-quit">✕ QUIT</button></div>
<div id="dpad"><div class="db" id="du">▲</div><div class="db" id="dd">▼</div><div class="db" id="dl">◀</div><div class="db" id="dr">▶</div></div>
<canvas id="mapc" style="display:none;position:absolute;top:0;left:0;z-index:15;"></canvas>

<script>
(()=>{
const CELL=8,COLS=60,ROWS=45,W=COLS*CELL,H=ROWS*CELL;
const EMPTY=0,BORDER=1,CLAIMED=2,TRAIL=3;
const DIR={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0],none:[0,0]};

// LEVELS
const LEVELS=[
{name:"SECTOR 1",desc:"ONE PATROL DRONE.\nLEARN THE BASICS.",enemies:[{speed:3,bounce:true}],lives:3,target:75,color:'#0af',bg:'#100828'},
{name:"SECTOR 2",desc:"TWO DRONES.\nWATCH YOUR TRAIL!",enemies:[{speed:3.5,bounce:true},{speed:3.5,bounce:true}],lives:3,target:75,color:'#0fa',bg:'#081828'},
{name:"SECTOR 3",desc:"A HUNTER LOCKS ON!\nKEEP MOVING.",enemies:[{speed:3,bounce:true},{speed:2.5,chase:true}],lives:3,target:75,color:'#a0f',bg:'#1a0a18'},
{name:"SECTOR 4",desc:"SWARM INCOMING.\nPLAN YOUR CUTS.",enemies:[{speed:4,bounce:true},{speed:4,bounce:true},{speed:3.5,bounce:true},{speed:2.8,chase:true}],lives:3,target:80,color:'#fa0',bg:'#181008'},
{name:"SECTOR 5",desc:"FAST HOSTILES.\nCLAIM 80% TO SURVIVE.",enemies:[{speed:5,bounce:true},{speed:5,bounce:true},{speed:4.5,bounce:true},{speed:3.5,chase:true},{speed:3.5,chase:true}],lives:4,target:80,color:'#f0a',bg:'#180810'},
{name:"SECTOR 6",desc:"⚠ BOSS SECTOR ⚠\nDEFEAT THE HIVE MIND!\nCLAIM 85% TO WIN.",enemies:[{speed:5.5,bounce:true},{speed:5.5,bounce:true},{speed:5,bounce:true},{speed:5,bounce:true},{speed:4,chase:true},{speed:3.5,chase:true}],lives:5,target:85,color:'#ff0',bg:'#180a10',boss:true},
];

// SAVE
let save={hi:0,unlocked:1,stars:[],scores:[]};
function loadS(){try{const d=JSON.parse(localStorage.getItem('zd2'));if(d)save=d;}catch(e){}}
function writeS(){try{localStorage.setItem('zd2',JSON.stringify(save));}catch(e){}}
loadS();

// CANVAS
const cv=document.getElementById('game'),c=cv.getContext('2d');
cv.width=W;cv.height=H;
const mc=document.getElementById('mapc'),mx=mc.getContext('2d');
mc.width=W;mc.height=H;
function fit(){const s=Math.min(innerWidth/W,innerHeight/H);cv.style.width=mc.style.width=(W*s)+'px';cv.style.height=mc.style.height=(H*s)+'px';}
fit();addEventListener('resize',fit);

// STARS
const stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.3,b:Math.random(),t:1+Math.random()*3});
function drawBg(cx,time,nebCol){
    cx.fillStyle='#000008';cx.fillRect(0,0,W,H);
    // Nebula clouds
    for(let i=0;i<3;i++){
        const nx=W*(0.2+i*0.3),ny=H*(0.3+i*0.2),r=80+i*30;
        const g=cx.createRadialGradient(nx,ny,0,nx,ny,r);
        g.addColorStop(0,nebCol||'rgba(20,5,40,0.35)');
        g.addColorStop(1,'transparent');
        cx.fillStyle=g;cx.fillRect(0,0,W,H);
    }
    for(const s of stars){
        const a=0.3+0.7*(0.5+0.5*Math.sin(time*0.001*s.t+s.x));
        cx.fillStyle=`rgba(180,200,255,${a*s.b})`;
        cx.fillRect(s.x|0,s.y|0,Math.ceil(s.s),Math.ceil(s.s));
    }
}

// PARTICLES
const P=[];
function sp(x,y,col,n,spread,life){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp2=Math.random()*spread;P.push({x,y,vx:Math.cos(a)*sp2,vy:Math.sin(a)*sp2,l:life||(0.3+Math.random()*0.4),ml:life||(0.3+Math.random()*0.4),c:col,s:1+Math.random()*2.5});}}
function upP(dt){for(let i=P.length-1;i>=0;i--){const p=P[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.l-=dt;if(p.l<=0)P.splice(i,1);}}
function drP(cx){for(const p of P){const a=p.l/p.ml,sz=p.s*a;cx.globalAlpha=a;cx.fillStyle=p.c;cx.fillRect((p.x-sz/2)|0,(p.y-sz/2)|0,Math.ceil(sz),Math.ceil(sz));}cx.globalAlpha=1;}

// FLOATING TEXT
const FT=[];
function addFT(x,y,text,color,size){FT.push({x,y,text,color,size:size||8,l:1.2,ml:1.2});}
function upFT(dt){for(let i=FT.length-1;i>=0;i--){FT[i].y-=dt*30;FT[i].l-=dt;if(FT[i].l<=0)FT.splice(i,1);}}
function drFT(cx){for(const f of FT){const a=Math.min(1,f.l/f.ml*2);cx.globalAlpha=a;cx.fillStyle=f.color;cx.font=f.size+'px "Press Start 2P"';cx.textAlign='center';cx.fillText(f.text,f.x|0,f.y|0);cx.globalAlpha=1;}}

// SOUND
let ac2;function ac(){if(!ac2)ac2=new(AudioContext||webkitAudioContext)();return ac2;}
function beep(f,d,t='square',v=0.06){try{const a=ac(),o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sfxClaim(){beep(523,0.08);setTimeout(()=>beep(659,0.08),40);setTimeout(()=>beep(784,0.12),80);}
function sfxDeath(){beep(200,0.2,'sawtooth',0.1);setTimeout(()=>beep(100,0.3,'sawtooth',0.08),80);}
function sfxMove(){beep(880,0.02,'square',0.012);}
function sfxWarp(){for(let i=0;i<6;i++)setTimeout(()=>beep(400+i*80,0.1,'square',0.05),i*50);}
function sfxSel(){beep(660,0.06);setTimeout(()=>beep(880,0.08),40);}
function sfxPow(){beep(440,0.1,'sine',0.08);setTimeout(()=>beep(660,0.1,'sine',0.08),60);setTimeout(()=>beep(880,0.15,'sine',0.08),120);}

// STATE
let grid=[],player={},enemies=[],trail=[],curLv=0,lives=3,totalC=0,claimedC=0,score=0;
let state='title',prevSt='playing',deathT=0,inputDir='none',moveCt=0;
let shakeA=0,shakeD=0,claimAC=[],claimAT=0;
let powerups=[],playerSpeed=8,trailSpeed=6,shieldTimer=0;
let levelTimer=0; // time in level

// POWER-UP TYPES
const PTYPE=[
    {name:'SPEED',color:'#0ff',icon:'⚡',dur:5,effect:()=>{playerSpeed=12;trailSpeed=9;}},
    {name:'SHIELD',color:'#ff0',icon:'🛡',dur:4,effect:()=>{shieldTimer=4;}},
    {name:'+1 LIFE',color:'#f44',icon:'♥',dur:0,effect:()=>{lives=Math.min(lives+1,LEVELS[curLv].lives+2);}},
    {name:'SLOW',color:'#a0f',icon:'🐌',dur:5,effect:()=>{for(const e of enemies)e.origSpeed=e.speed,e.speed*=0.5;}},
];

// INPUT
const keys={};
addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='Escape'||e.key==='p'){if(state==='playing')pauseG();else if(state==='paused')resumeG();}});
addEventListener('keyup',e=>keys[e.key]=false);
function rI(){if(keys.ArrowUp||keys.w)return'up';if(keys.ArrowDown||keys.s)return'down';if(keys.ArrowLeft||keys.a)return'left';if(keys.ArrowRight||keys.d)return'right';return dD||'none';}
let dD=null;
[['du','up'],['dd','down'],['dl','left'],['dr','right']].forEach(([id,dir])=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();dD=dir;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();if(dD===dir)dD=null;el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',e=>{e.preventDefault();if(dD===dir)dD=null;el.classList.remove('pressed');},{passive:false});
});

// GRID
function initG(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let cc=0;cc<COLS;cc++)grid[r][cc]=(r===0||r===ROWS-1||cc===0||cc===COLS-1)?BORDER:EMPTY;}totalC=(COLS-2)*(ROWS-2);claimedC=0;}
function cAt(x,y){if(x<0||x>=COLS||y<0||y>=ROWS)return BORDER;return grid[y][x];}

function claimT(){
    const tLen=trail.length;
    for(const t of trail)grid[t.y][t.x]=CLAIMED;trail=[];
    const vis=Array.from({length:ROWS},()=>new Uint8Array(COLS));
    const regs=[];
    for(let r=1;r<ROWS-1;r++)for(let cc=1;cc<COLS-1;cc++){
        if(grid[r][cc]!==EMPTY||vis[r][cc])continue;
        const reg=[],q=[{x:cc,y:r}];vis[r][cc]=1;let hasE=false;
        while(q.length){const{x,y}=q.shift();reg.push({x,y});for(const e of enemies){if(Math.round(e.x)===x&&Math.round(e.y)===y)hasE=true;}
        for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){const nx=x+dx,ny=y+dy;if(nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1||vis[ny][nx]||grid[ny][nx]!==EMPTY)continue;vis[ny][nx]=1;q.push({x:nx,y:ny});}}
        regs.push({cells:reg,hasE});
    }
    claimAC=[];let cNow=0;
    for(const reg of regs)if(!reg.hasE){for(const{x,y}of reg.cells){grid[y][x]=CLAIMED;claimAC.push({x,y});}cNow+=reg.cells.length;}
    claimAT=0.4;
    claimedC=0;for(let r=1;r<ROWS-1;r++)for(let cc=1;cc<COLS-1;cc++)if(grid[r][cc]===CLAIMED)claimedC++;
    const pts=tLen*10+cNow*5;score+=pts;
    sfxClaim();
    // Score popup
    if(cNow>0){
        const px=player.x*CELL+CELL/2,py=player.y*CELL-10;
        if(cNow>200){addFT(px,py,'AMAZING!','#ff0',9);addFT(px,py+14,'+'+pts,'#0f0',7);}
        else if(cNow>100){addFT(px,py,'GREAT!','#0ff',8);addFT(px,py+12,'+'+pts,'#0f0',6);}
        else if(cNow>30){addFT(px,py,'GOOD!','#0af',7);addFT(px,py+11,'+'+pts,'#0f0',6);}
        else{addFT(px,py,'+'+pts,'#0f0',6);}
    }
    // Claim particles
    if(claimAC.length>0){const step=Math.max(1,(claimAC.length/20)|0);for(let i=0;i<claimAC.length;i+=step){const cc=claimAC[i];sp(cc.x*CELL+CELL/2,cc.y*CELL+CELL/2,'#0fa',2,25,0.3);}}
    // Maybe spawn power-up
    if(cNow>20&&Math.random()<0.35)spawnPowerup();
}

// POWER-UPS
function spawnPowerup(){
    let px,py,tries=0;
    do{px=2+Math.floor(Math.random()*(COLS-4));py=2+Math.floor(Math.random()*(ROWS-4));tries++;}
    while(grid[py][px]!==EMPTY&&tries<50);
    if(tries>=50)return;
    const type=PTYPE[Math.floor(Math.random()*PTYPE.length)];
    powerups.push({x:px,y:py,type,t:0});
}
function checkPowerups(){
    for(let i=powerups.length-1;i>=0;i--){
        const p=powerups[i];
        if(player.x===p.x&&player.y===p.y){
            sfxPow();
            addFT(p.x*CELL+CELL/2,p.y*CELL-8,p.type.name,'#ff0',7);
            sp(p.x*CELL+CELL/2,p.y*CELL+CELL/2,p.type.color,15,40,0.4);
            p.type.effect();
            powerups.splice(i,1);
        }
    }
}

// PLAYER
function initP(){player={x:Math.floor(COLS/2),y:0,mt:0,cutting:false,dir:'none'};trail=[];inputDir='none';playerSpeed=8;trailSpeed=6;shieldTimer=0;}
function moveP(dt){
    const nd=rI();if(nd!=='none')inputDir=nd;
    const spd=player.cutting?trailSpeed:playerSpeed;
    player.mt+=dt*spd;if(player.mt<1)return;player.mt-=1;
    if(inputDir==='none'){player.mt=0;return;}
    const[dx,dy]=DIR[inputDir],nx=player.x+dx,ny=player.y+dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS){player.mt=0;return;}
    const dc=cAt(nx,ny);
    if(player.cutting){
        if(dc===TRAIL){if(shieldTimer>0){shieldTimer=0;addFT(player.x*CELL,player.y*CELL-10,'SHIELD!','#ff0',6);}else{killP();return;}}
        else if(dc===BORDER||dc===CLAIMED){player.x=nx;player.y=ny;player.cutting=false;claimT();checkWin();return;}
        else{trail.push({x:player.x,y:player.y});grid[player.y][player.x]=TRAIL;player.x=nx;player.y=ny;}
    }else{
        if(dc===BORDER||dc===CLAIMED){player.x=nx;player.y=ny;}
        else if(dc===EMPTY){trail.push({x:player.x,y:player.y});player.cutting=true;player.x=nx;player.y=ny;}
    }
    player.dir=inputDir;moveCt++;if(moveCt%4===0)sfxMove();
    checkPowerups();
}
function killP(){
    if(shieldTimer>0){shieldTimer=0;addFT(player.x*CELL,player.y*CELL-10,'SHIELD!','#ff0',7);sp(player.x*CELL+CELL/2,player.y*CELL+CELL/2,'#ff0',20,50,0.3);return;}
    for(const t of trail)grid[t.y][t.x]=EMPTY;trail=[];player.cutting=false;lives--;
    sfxDeath();shakeA=6;shakeD=0.3;
    sp(player.x*CELL+CELL/2,player.y*CELL+CELL/2,'#f42',30,80,0.5);
    sp(player.x*CELL+CELL/2,player.y*CELL+CELL/2,'#fa0',20,60,0.4);
    if(lives<=0){state='dead';showScr('scr-over',{sc:'SCORE: '+score,info:'REACHED '+LEVELS[curLv].name});}
    else{state='dying';deathT=0.5;}
}
function getPct(){return(claimedC/totalC*100)|0;}
function checkWin(){
    const pct=getPct();
    if(pct>=LEVELS[curLv].target){
        let st=1;if(pct>=LEVELS[curLv].target+5)st=2;if(pct>=LEVELS[curLv].target+15)st=3;
        score+=pct*20+lives*500;
        if(!save.stars[curLv]||save.stars[curLv]<st)save.stars[curLv]=st;
        if(!save.scores[curLv]||save.scores[curLv]<score)save.scores[curLv]=score;
        if(curLv+1>=save.unlocked)save.unlocked=Math.min(curLv+2,LEVELS.length);
        if(score>save.hi)save.hi=score;writeS();
        sfxWarp();sp(W/2,H/2,'#ff0',50,120,0.8);sp(W/2,H/2,'#0ff',30,80,0.6);
        state='won';
        if(curLv>=LEVELS.length-1){showScr('scr-done',{sc:'FINAL SCORE: '+score});}
        else{document.getElementById('w-stars').textContent='★'.repeat(st)+'☆'.repeat(3-st);showScr('scr-win',{sc:'SCORE: '+score,info:'TERRITORY: '+pct+'%'});}
    }
}

// ENEMIES
function initE(lvl){
    enemies=[];
    for(const ed of lvl.enemies){
        let ex,ey;do{ex=5+Math.floor(Math.random()*(COLS-10));ey=5+Math.floor(Math.random()*(ROWS-10));}while(grid[ey][ex]!==EMPTY);
        const a=Math.random()*Math.PI*2;
        enemies.push({x:ex,y:ey,fx:ex,fy:ey,dx:Math.cos(a),dy:Math.sin(a),speed:ed.speed,origSpeed:ed.speed,chase:ed.chase||false,bounce:ed.bounce||false,rot:0});
    }
}
function moveE(dt){
    for(const e of enemies){
        // Restore speed if slow wore off
        if(e.speed<e.origSpeed)e.speed=Math.min(e.speed+dt*0.5,e.origSpeed);
        if(e.chase){const px=player.x-e.x,py=player.y-e.y,d=Math.sqrt(px*px+py*py)||1;e.dx=px/d;e.dy=py/d;}
        e.fx+=e.dx*e.speed*dt;e.fy+=e.dy*e.speed*dt;
        const nx=Math.round(e.fx),ny=Math.round(e.fy),cc=cAt(nx,ny);
        if(cc===BORDER||cc===CLAIMED||nx<1||nx>=COLS-1||ny<1||ny>=ROWS-1){
            if(e.chase){e.fx-=e.dx*e.speed*dt;e.fy-=e.dy*e.speed*dt;e.dx+=(Math.random()-0.5)*0.5;e.dy+=(Math.random()-0.5)*0.5;}
            else{e.fx-=e.dx*e.speed*dt*2;e.fy-=e.dy*e.speed*dt*2;const tx=cAt(Math.round(e.fx+e.dx*0.5),Math.round(e.fy)),ty=cAt(Math.round(e.fx),Math.round(e.fy+e.dy*0.5));if(tx===BORDER||tx===CLAIMED)e.dx=-e.dx;if(ty===BORDER||ty===CLAIMED)e.dy=-e.dy;e.dx+=(Math.random()-0.5)*0.2;e.dy+=(Math.random()-0.5)*0.2;}
            const len=Math.sqrt(e.dx*e.dx+e.dy*e.dy)||1;e.dx/=len;e.dy/=len;
        }
        e.x=Math.round(e.fx);e.y=Math.round(e.fy);e.rot=Math.atan2(e.dy,e.dx);
        if(cAt(e.x,e.y)===TRAIL){killP();return;}
        if(player.cutting){const px=player.x-e.fx,py=player.y-e.fy;if(px*px+py*py<1.5){killP();return;}}
    }
}

// DETAILED SHIP DRAWING
function drawPlayerShip(cx,px,py,rot,cutting,time){
    cx.save();cx.translate(px,py);cx.rotate(rot-Math.PI/2);
    const s=CELL*0.9;
    // Engine glow
    const eg=cx.createRadialGradient(0,s*0.6,0,0,s*0.6,s*0.5);
    eg.addColorStop(0,cutting?'rgba(0,255,150,0.6)':'rgba(0,150,255,0.6)');
    eg.addColorStop(1,'transparent');
    cx.fillStyle=eg;cx.beginPath();cx.arc(0,s*0.6,s*0.5,0,Math.PI*2);cx.fill();
    // Engine flames (animated)
    const flicker=0.7+0.3*Math.sin(time*0.02);
    cx.fillStyle=cutting?'#0fa':'#08f';
    cx.fillRect(-s*0.15,s*0.3,s*0.1,s*0.4*flicker);
    cx.fillRect(s*0.05,s*0.3,s*0.1,s*0.35*flicker);
    cx.fillStyle=cutting?'#aff':'#8df';
    cx.fillRect(-s*0.1,s*0.35,s*0.05,s*0.2*flicker);
    cx.fillRect(s*0.07,s*0.35,s*0.05,s*0.18*flicker);
    // Wings
    cx.fillStyle=cutting?'#088':'#048';
    cx.beginPath();cx.moveTo(-s*0.15,s*0.1);cx.lineTo(-s*0.7,s*0.5);cx.lineTo(-s*0.6,s*0.3);cx.lineTo(-s*0.15,-s*0.1);cx.fill();
    cx.beginPath();cx.moveTo(s*0.15,s*0.1);cx.lineTo(s*0.7,s*0.5);cx.lineTo(s*0.6,s*0.3);cx.lineTo(s*0.15,-s*0.1);cx.fill();
    // Wing tips (glowing)
    cx.fillStyle=cutting?'#0fa':'#0af';
    cx.fillRect(-s*0.7,s*0.4,s*0.15,s*0.12);
    cx.fillRect(s*0.55,s*0.4,s*0.15,s*0.12);
    // Body
    cx.fillStyle=cutting?'#0ca':'#0af';
    cx.beginPath();cx.moveTo(0,-s*0.8);cx.lineTo(-s*0.2,s*0.4);cx.lineTo(s*0.2,s*0.4);cx.fill();
    // Body detail stripe
    cx.fillStyle=cutting?'#0ea':'#0cf';
    cx.beginPath();cx.moveTo(0,-s*0.6);cx.lineTo(-s*0.08,s*0.2);cx.lineTo(s*0.08,s*0.2);cx.fill();
    // Cockpit
    cx.fillStyle=cutting?'#afe':'#8ef';
    cx.beginPath();cx.ellipse(0,-s*0.3,s*0.08,s*0.15,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff';cx.beginPath();cx.ellipse(-s*0.02,-s*0.35,s*0.03,s*0.05,0,0,Math.PI*2);cx.fill();
    // Nose
    cx.fillStyle=cutting?'#0fa':'#0af';
    cx.beginPath();cx.moveTo(0,-s);cx.lineTo(-s*0.06,-s*0.7);cx.lineTo(s*0.06,-s*0.7);cx.fill();
    cx.restore();
}

function drawEnemyShip(cx,ex,ey,rot,chase,time){
    cx.save();cx.translate(ex,ey);cx.rotate(rot-Math.PI/2);
    const s=CELL*0.8;
    // Engine
    const fl=0.7+0.3*Math.sin(time*0.025);
    cx.fillStyle=chase?'#f40':'#a0f';
    cx.fillRect(-s*0.1,s*0.2,s*0.08,s*0.3*fl);
    cx.fillRect(s*0.02,s*0.2,s*0.08,s*0.25*fl);
    // Wings (menacing)
    cx.fillStyle=chase?'#800':'#408';
    cx.beginPath();cx.moveTo(-s*0.1,0);cx.lineTo(-s*0.8,s*0.3);cx.lineTo(-s*0.5,s*0.1);cx.lineTo(-s*0.7,-s*0.2);cx.lineTo(-s*0.1,-s*0.1);cx.fill();
    cx.beginPath();cx.moveTo(s*0.1,0);cx.lineTo(s*0.8,s*0.3);cx.lineTo(s*0.5,s*0.1);cx.lineTo(s*0.7,-s*0.2);cx.lineTo(s*0.1,-s*0.1);cx.fill();
    // Wing tips
    cx.fillStyle=chase?'#f44':'#c4f';
    cx.fillRect(-s*0.8,s*0.2,s*0.12,s*0.12);
    cx.fillRect(s*0.68,s*0.2,s*0.12,s*0.12);
    // Body
    cx.fillStyle=chase?'#c22':'#84c';
    cx.beginPath();cx.moveTo(0,-s*0.7);cx.lineTo(-s*0.2,s*0.3);cx.lineTo(s*0.2,s*0.3);cx.fill();
    // Core eye
    const pulse=0.5+0.5*Math.sin(time*0.008);
    cx.fillStyle=chase?`rgba(255,100,50,${pulse})`:`rgba(200,100,255,${pulse})`;
    cx.beginPath();cx.arc(0,-s*0.1,s*0.12,0,Math.PI*2);cx.fill();
    cx.fillStyle=chase?'#faa':'#eaf';
    cx.beginPath();cx.arc(0,-s*0.1,s*0.06,0,Math.PI*2);cx.fill();
    cx.restore();
}

// RENDER
function render(time){
    c.save();
    if(shakeD>0)c.translate((Math.random()-0.5)*shakeA*2,(Math.random()-0.5)*shakeA*2);
    drawBg(c,time,LEVELS[curLv].bg);

    // Grid
    for(let r=0;r<ROWS;r++)for(let cc=0;cc<COLS;cc++){
        const cell=grid[r][cc];if(cell===EMPTY)continue;
        if(cell===BORDER){
            c.fillStyle='rgba(20,40,80,0.4)';c.fillRect(cc*CELL,r*CELL,CELL,CELL);
            if((r+cc)%4<2){c.fillStyle='rgba(0,120,255,0.1)';c.fillRect(cc*CELL,r*CELL,CELL,CELL);}
        }else if(cell===CLAIMED){
            c.fillStyle=(r+cc)%2?'rgba(0,80,160,0.22)':'rgba(0,80,160,0.3)';
            c.fillRect(cc*CELL,r*CELL,CELL,CELL);
            c.fillStyle='rgba(0,150,255,0.04)';c.fillRect(cc*CELL,r*CELL,1,CELL);c.fillRect(cc*CELL,r*CELL,CELL,1);
        }else if(cell===TRAIL){
            c.fillStyle='#0fa';c.fillRect(cc*CELL+1,r*CELL+1,CELL-2,CELL-2);
            c.fillStyle='rgba(200,255,220,0.7)';c.fillRect(cc*CELL+2,r*CELL+2,CELL-4,CELL-4);
        }
    }

    // Claim flash
    if(claimAT>0){const a=claimAT/0.4;c.fillStyle=`rgba(0,255,150,${a*0.2})`;for(const cc of claimAC)c.fillRect(cc.x*CELL,cc.y*CELL,CELL,CELL);}

    // Trail glow
    if(trail.length>1){
        c.strokeStyle='rgba(0,255,170,0.15)';c.lineWidth=CELL+4;
        c.beginPath();c.moveTo(trail[0].x*CELL+CELL/2,trail[0].y*CELL+CELL/2);
        for(let i=1;i<trail.length;i++)c.lineTo(trail[i].x*CELL+CELL/2,trail[i].y*CELL+CELL/2);
        if(player.cutting)c.lineTo(player.x*CELL+CELL/2,player.y*CELL+CELL/2);
        c.stroke();
    }

    // Power-ups
    for(const p of powerups){
        p.t+=0.016;
        const px=p.x*CELL+CELL/2,py=p.y*CELL+CELL/2;
        const bob=Math.sin(p.t*3)*2;
        // Glow
        c.beginPath();c.arc(px,py+bob,CELL*0.7,0,Math.PI*2);
        const pg=c.createRadialGradient(px,py+bob,0,px,py+bob,CELL*0.7);
        pg.addColorStop(0,p.type.color+'66');pg.addColorStop(1,'transparent');
        c.fillStyle=pg;c.fill();
        // Icon bg
        c.fillStyle=p.type.color;c.beginPath();c.arc(px,py+bob,CELL*0.4,0,Math.PI*2);c.fill();
        // Sparkle
        if(Math.random()>0.8)sp(px+(Math.random()-0.5)*8,py+bob+(Math.random()-0.5)*8,p.type.color,1,10,0.2);
    }

    // Enemies
    for(const e of enemies){
        const ex=e.fx*CELL+CELL/2,ey=e.fy*CELL+CELL/2;
        // Engine particles
        if(Math.random()>0.5){const bx=ex-Math.cos(e.rot)*4,by=ey-Math.sin(e.rot)*4;sp(bx,by,e.chase?'#f42':'#c4f',1,15,0.12);}
        // Ship glow
        c.beginPath();c.arc(ex,ey,CELL,0,Math.PI*2);
        c.fillStyle=e.chase?'rgba(255,50,30,0.1)':'rgba(200,50,255,0.1)';c.fill();
        drawEnemyShip(c,ex,ey,e.rot,e.chase,time);
        // Health bar for chasers
        if(e.chase){
            c.fillStyle='rgba(0,0,0,0.5)';c.fillRect(ex-8,ey-CELL-2,16,3);
            c.fillStyle='#f44';c.fillRect(ex-8,ey-CELL-2,16,3);
        }
    }

    // Player
    if(state==='playing'||state==='dying'||state==='paused'){
        const px=player.x*CELL+CELL/2,py=player.y*CELL+CELL/2;
        const[ddx,ddy]=DIR[inputDir]||[0,1];const rot=Math.atan2(ddy,ddx);
        // Shield visual
        if(shieldTimer>0){
            const sa=0.3+0.2*Math.sin(time*0.01);
            c.strokeStyle=`rgba(255,255,0,${sa})`;c.lineWidth=2;
            c.beginPath();c.arc(px,py,CELL*1.1,0,Math.PI*2);c.stroke();
        }
        // Ship
        drawPlayerShip(c,px,py,rot,player.cutting,time);
        // Border shield ring
        if(!player.cutting&&shieldTimer<=0){
            c.strokeStyle=`rgba(0,200,255,${0.1+0.06*Math.sin(time*0.005)})`;c.lineWidth=1;
            c.beginPath();c.arc(px,py,CELL*0.95,0,Math.PI*2);c.stroke();
        }
        // Engine particles
        if(state==='playing'&&inputDir!=='none'){sp(px-ddx*4,py-ddy*4,player.cutting?'#0fa':'#08f',1,15,0.1);}
    }

    drP(c);drFT(c);

    // Death flash
    if(state==='dying'&&Math.sin(deathT*25)>0){c.fillStyle='rgba(255,30,0,0.1)';c.fillRect(0,0,W,H);}

    // Scanlines
    c.fillStyle='rgba(0,0,0,0.025)';for(let y=0;y<H;y+=2)c.fillRect(0,y,W,1);
    c.restore();
}

// MAP
const mN=[];
(()=>{const cx=W/2,sp=50;for(let i=0;i<LEVELS.length;i++)mN.push({x:cx+Math.sin(i*1.2)*80,y:H-60-i*sp,lv:i});})();
let mSel=0,mVis=false;
function showMap(){mVis=true;mc.style.display='block';state='map';hideScr();document.getElementById('hud').style.display='none';document.getElementById('pov').classList.remove('visible');mSel=Math.min(save.unlocked-1,LEVELS.length-1);}
function hideMap(){mVis=false;mc.style.display='none';}
mc.addEventListener('click',e=>{
    if(!mVis)return;const r=mc.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
    const mx2=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
    for(const n of mN){if((mx2-n.x)**2+(my-n.y)**2<400){if(n.lv<save.unlocked){sfxSel();startLv(n.lv);hideMap();}else beep(150,0.15,'sawtooth',0.06);return;}}
});
addEventListener('keydown',e=>{if(!mVis)return;if(e.key==='ArrowUp'||e.key==='w'){mSel=Math.min(mSel+1,save.unlocked-1);sfxSel();}if(e.key==='ArrowDown'||e.key==='s'){mSel=Math.max(mSel-1,0);sfxSel();}if(e.key==='Enter'||e.key===' '){startLv(mSel);hideMap();sfxSel();}});

function renderMap(time){
    if(!mVis)return;drawBg(mx,time);
    mx.fillStyle='#0ff';mx.font='11px "Press Start 2P"';mx.textAlign='center';mx.fillText('SELECT SECTOR',W/2,22);
    mx.fillStyle='#ff0';mx.font='7px "Press Start 2P"';mx.fillText('HI-SCORE: '+save.hi,W/2,36);
    // Path
    mx.strokeStyle='rgba(0,150,255,0.25)';mx.lineWidth=3;mx.setLineDash([4,4]);
    mx.beginPath();for(let i=0;i<mN.length;i++){if(i===0)mx.moveTo(mN[i].x,mN[i].y);else mx.lineTo(mN[i].x,mN[i].y);}mx.stroke();mx.setLineDash([]);
    // Nodes
    for(let i=0;i<mN.length;i++){
        const n=mN[i],ul=i<save.unlocked,sel=i===mSel,lv=LEVELS[i];
        if(ul){
            const p=0.5+0.5*Math.sin(time*0.003+i);
            mx.beginPath();mx.arc(n.x,n.y,18,0,Math.PI*2);
            mx.fillStyle=`rgba(${sel?'0,255,200':'0,150,255'},${0.06+0.04*p})`;mx.fill();
            // Planet
            const pg=mx.createRadialGradient(n.x-3,n.y-3,0,n.x,n.y,12);
            pg.addColorStop(0,'#fff3');pg.addColorStop(0.3,lv.color);pg.addColorStop(1,lv.color+'88');
            mx.beginPath();mx.arc(n.x,n.y,12,0,Math.PI*2);mx.fillStyle=pg;mx.fill();
            // Number
            mx.fillStyle='#000';mx.font='7px "Press Start 2P"';mx.textAlign='center';mx.fillText(''+(i+1),n.x,n.y+3);
        }else{
            mx.beginPath();mx.arc(n.x,n.y,12,0,Math.PI*2);mx.fillStyle='#181818';mx.fill();
            mx.strokeStyle='#333';mx.lineWidth=1;mx.stroke();
            mx.fillStyle='#444';mx.font='7px "Press Start 2P"';mx.textAlign='center';mx.fillText('?',n.x,n.y+3);
        }
        if(save.stars[i]){mx.fillStyle='#ff0';mx.font='5px "Press Start 2P"';mx.textAlign='center';mx.fillText('★'.repeat(save.stars[i])+'☆'.repeat(3-save.stars[i]),n.x,n.y+22);}
        if(sel&&ul){
            const sa=0.4+0.6*Math.sin(time*0.006);
            mx.beginPath();mx.arc(n.x,n.y,16,0,Math.PI*2);mx.strokeStyle=`rgba(0,255,200,${sa})`;mx.lineWidth=2;mx.stroke();
            mx.fillStyle='#fff';mx.font='6px "Press Start 2P"';mx.textAlign='center';mx.fillText(lv.name,n.x,n.y-22);
            if(lv.boss){mx.fillStyle='#f44';mx.fillText('⚠ BOSS',n.x,n.y-32);}
        }
    }
    mx.fillStyle='#68a';mx.font='5px "Press Start 2P"';mx.textAlign='center';mx.fillText('TAP PLANET OR ▲▼ + ENTER',W/2,H-14);
    drP(mx);
}

// UI
function showScr(id,o={}){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));document.getElementById(id).classList.add('visible');document.getElementById('ui-overlay').classList.add('active');
if(o.sc){const el=document.getElementById(id.replace('scr-','')===id?null:id.replace('scr-','')[0]+'-sc');if(el)el.textContent=o.sc;
    // Try various id patterns
    const pre=id.replace('scr-','');
    ['o-sc','w-sc','c-sc'].forEach(eid=>{const e=document.getElementById(eid);if(e&&o.sc&&eid[0]===pre[0])e.textContent=o.sc;});
}
if(o.info){['d-info','o-info','w-info'].forEach(eid=>{const e=document.getElementById(eid);if(e&&o.info)e.textContent=o.info;});}
if(o.sc){['o-sc','w-sc','c-sc'].forEach(eid=>{const e=document.getElementById(eid);if(e)e.textContent=o.sc;});}
}
function hideScr(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('visible'));document.getElementById('ui-overlay').classList.remove('active');}
function updateHUD(){
    document.getElementById('h-lv').textContent=''+(curLv+1);
    document.getElementById('h-sc').textContent=''+score;
    document.getElementById('h-hi').textContent=''+Math.max(save.hi,score);
    document.getElementById('h-cl').textContent=getPct()+'%/'+LEVELS[curLv].target+'%';
    document.getElementById('h-lv2').textContent='♥'.repeat(lives);
}
function pauseG(){prevSt=state;state='paused';document.getElementById('pov').classList.add('visible');}
function resumeG(){state=prevSt;document.getElementById('pov').classList.remove('visible');}

// LEVEL
function startLv(i){
    curLv=i;const lv=LEVELS[i];lives=lv.lives;score=0;levelTimer=0;
    initG();initP();initE(lv);powerups=[];
    inputDir='none';P.length=0;FT.length=0;claimAC=[];
    document.getElementById('l-title').textContent=lv.name+(lv.boss?' ⚠':'');
    document.getElementById('l-desc').textContent=lv.desc;
    showScr('scr-lvl');state='levelIntro';
}
function beginLv(){hideScr();document.getElementById('hud').style.display='flex';state='playing';}
function respawn(){for(const t of trail)grid[t.y][t.x]=EMPTY;trail=[];player.cutting=false;player.x=Math.floor(COLS/2);player.y=0;player.mt=0;inputDir='none';playerSpeed=8;trailSpeed=6;shieldTimer=0;hideScr();state='playing';}

// BUTTONS
document.getElementById('b-start').onclick=()=>{sfxSel();showMap();};
document.getElementById('b-go').onclick=()=>{sfxSel();beginLv();};
document.getElementById('b-cont').onclick=()=>{sfxSel();respawn();};
document.getElementById('b-retry').onclick=()=>{sfxSel();hideScr();startLv(curLv);};
document.getElementById('b-next').onclick=()=>{sfxSel();startLv(curLv+1);};
document.getElementById('b-again').onclick=()=>{sfxSel();hideScr();showMap();};
document.getElementById('b-map1').onclick=document.getElementById('b-map2').onclick=()=>{sfxSel();hideScr();showMap();};
document.getElementById('hud-pause').onclick=()=>pauseG();
document.getElementById('p-res').onclick=()=>{sfxSel();resumeG();};
document.getElementById('p-rty').onclick=()=>{sfxSel();resumeG();startLv(curLv);};
document.getElementById('p-map').onclick=()=>{sfxSel();resumeG();showMap();};
document.getElementById('p-quit').onclick=()=>{sfxSel();resumeG();hideScr();state='title';showScr('scr-title');document.getElementById('hud').style.display='none';};

// LOOP
let lt=0;
function loop(time){
    const dt=Math.min((time-lt)/1000,0.05);lt=time;
    if(state==='playing'){
        moveP(dt);moveE(dt);updateHUD();levelTimer+=dt;
        if(shieldTimer>0)shieldTimer-=dt;
        // Speed power-up timeout
        if(playerSpeed>8){playerSpeed-=dt*0.8;if(playerSpeed<=8){playerSpeed=8;trailSpeed=6;}}
        // Random power-up spawn
        if(powerups.length<2&&Math.random()<0.001)spawnPowerup();
    }
    if(state==='dying'){deathT-=dt;if(deathT<=0){showScr('scr-die',{info:`${lives} SHIELD${lives===1?'':'S'} — ${getPct()}% CLAIMED`});state='dead_pause';}}
    if(claimAT>0)claimAT-=dt;if(shakeD>0)shakeD-=dt;
    upP(dt);upFT(dt);
    if(mVis)renderMap(time);else render(time);
    requestAnimationFrame(loop);
}
initG();requestAnimationFrame(loop);
})();
</script>
